<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprocker Walk Coach</title>
<meta name="theme-color" content="#1b4332" />

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #e5e7eb;
}

.container {
  padding: 16px;
  max-width: 540px;
  margin: 0 auto;
}

.card {
  background: #111827;
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

h2 { margin: 6px 0 10px; font-size: 22px; }

p { margin: 6px 0; color: #cbd5e1; }

.small { font-size: 12px; color: #94a3b8; }

button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  background: #22c55e;
  color: black;
  font-size: 18px;
  font-weight: bold;
}

button:active { transform: scale(0.98); }

.hidden { display: none; }

.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
}

.check-item input { width: 20px; height: 20px; margin: 0; }

.check-item label { font-size: 15px; color: #e5e7eb; }

input[type="number"] {
  width: 100%; padding: 10px; border-radius: 10px;
  border: none; margin: 6px 0 12px;
  font-size: 16px; background: #1f2937; color: white;
}

.progress {
  height: 10px; background: #1f2937;
  border-radius: 999px; overflow: hidden;
  margin-top: 10px;
}

.bar { height: 100%; width: 0%; background: #22c55e; transition: width 0.4s ease; }

.phaseTitle { font-size: 26px; font-weight: bold; }

.phaseText { font-size: 15px; margin-top: 6px; color: #cbd5e1; }

ul { margin: 10px 0 0 18px; color: #94a3b8; }

.warning {
  background: #f59e0b;
  color: black;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display:none;
  font-weight: bold;
}

.decision {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #0b1220;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 10px;
  display: flex;
  gap: 8px;
}

.decision button {
  font-size: 12px;
  padding: 10px;
  background: #334155;
  color: white;
  border-radius: 10px;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.overlayCard {
  background: #111827;
  padding: 20px;
  border-radius: 14px;
  width: 85%;
}
</style>
</head>
<body>

<div class="container">

<div id="startScreen" class="card">
  <h2>🐾 Walk Coach</h2>
  <button onclick="initAudio(); showChecklist()">Start Walk</button>
</div>

<div id="checklistScreen" class="card hidden">
  <h2>Before You Go</h2>
  <div class="check-item"><input type="checkbox"><label>Treats</label></div>
  <div class="check-item"><input type="checkbox"><label>Scatter treats</label></div>
  <div class="check-item"><input type="checkbox"><label>Ball</label></div>
  <div class="check-item"><input type="checkbox"><label>poo bags</label></div>
  <button onclick="showSettings()">Continue</button>
</div>

<div id="settingsScreen" class="card hidden">
  <h2>Walk Setup</h2>
  Connection <input id="t1" type="number" value="5">
  Controlled Freedom <input id="t2" type="number" value="7">
  Hunting Work <input id="t3" type="number" value="6">
  Managed Freedom <input id="t4" type="number" value="7">
  Reset <input id="t5" type="number" value="7">
  Play <input id="t6" type="number" value="8">
  Cooldown <input id="t7" type="number" value="5">
  <button onclick="startWalk()">Start Walk</button>
</div>

<div id="walkScreen" class="card hidden">
  <div class="phaseTitle" id="phaseTitle"></div>
  <ul id="activityList"></ul>
  <div class="warning" id="warning">⚠️ 1 minute remaining</div>
  <button onclick="nextPhase()">NEXT</button>
</div>

</div>

<div class="decision">
  <button onclick="decision('range')">Too far → bring in</button>
  <button onclick="decision('recall')">Recall weak → reward more</button>
  <button onclick="decision('over')">Too excited → reset calm</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlayCard" id="overlayText"></div>
</div>

<script>
let phases=[],current=0;

function showOverlay(t){
  overlayText.innerText=t;
  overlay.style.display="flex";
  setTimeout(()=>overlay.style.display="none",2500);
}

function decision(type){
if(type==="range"){
  showOverlay("Stop → recall once → turn away → reward → release");
  current=4;
}
if(type==="recall"){
  showOverlay("Move closer → high reward → call once → reward → shorten distance");
  current=1;
}
if(type==="over"){
  showOverlay("Stop → lead on → sit → wait → calm → release");
  current=4;
}
startPhase();
}

function startWalk(){
phases=[
{name:"Release Routine",activities:["Pause → name → reward check-in → release"]},
{name:"Connection",activities:["Lead walking","Check-ins","Reward orientation"]},
{name:"Controlled Freedom",activities:["Explore","Recall","Reward returns"]},
{name:"Hunting Work",activities:["Search","Find it games"]},
{name:"Managed Freedom",activities:["Free roam","Recall checks"]},
{name:"Reset",activities:["Calm sniff","Close work"]},
{name:"Play",activities:["Ball","Chase"]},
{name:"Cool Down",activities:["Slow walk","Settle"]}
];
current=0;
showPhase();
}

function showPhase(){
let p=phases[current];
phaseTitle.innerText=p.name;
activityList.innerHTML="";
p.activities.forEach(a=>{
let li=document.createElement("li");li.innerText=a;activityList.appendChild(li);
});
}

function nextPhase(){current++;if(current<phases.length)showPhase();}
</script>

</body>
</html>
