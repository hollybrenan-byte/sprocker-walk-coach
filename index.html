<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprocker Walk Coach</title>
<meta name="theme-color" content="#1b4332" />

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
}

.container{padding:16px;max-width:540px;margin:0 auto;}

.card{
  background:#111827;
  padding:18px;
  border-radius:16px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
}

h2{margin:6px 0 10px;font-size:22px;}

.hidden{display:none;}

button{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:#22c55e;
  color:black;
  font-size:18px;
  font-weight:bold;
}

button:active{transform:scale(0.98);}

.check-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

.check-item input{width:20px;height:20px;}

.small{font-size:12px;color:#94a3b8;}

ul{color:#cbd5e1;margin-left:18px;}

.decision{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  gap:8px;
}

.decision button{
  font-size:12px;
  padding:10px;
  background:#334155;
  color:white;
  border-radius:10px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.overlayCard{
  background:#111827;
  padding:20px;
  border-radius:14px;
  width:85%;
}

.progress{
  height:10px;
  background:#1f2937;
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}

.timer{
  margin-top:8px;
  font-size:13px;
  color:#94a3b8;
}

.warning{
  margin-top:10px;
  padding:8px;
  background:#f59e0b;
  color:black;
  border-radius:8px;
  display:none;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div id="startScreen" class="card">
  <h2>🐾 Walk Coach</h2>
  <button onclick="showChecklist()">Start Walk</button>
</div>

<div id="checklistScreen" class="card hidden">
  <h2>Before You Go</h2>
  <div class="check-item"><input type="checkbox"><label>Treats</label></div>
  <div class="check-item"><input type="checkbox"><label>Scatter treats</label></div>
  <div class="check-item"><input type="checkbox"><label>Ball</label></div>
  <div class="check-item"><input type="checkbox"><label>Poo bags</label></div>
  <button onclick="showWalk()">Continue</button>
</div>

<div id="walkScreen" class="card hidden">
  <h2 id="phaseTitle"></h2>
  <p id="phaseDesc" class="small"></p>
  <ul id="activityList"></ul>

  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="timer" id="timer"></div>
  <div class="warning" id="warning">⚠️ 1 minute remaining</div>

  <button onclick="nextPhase()">NEXT</button>
</div>

</div>

<div class="decision">
  <button onclick="decision('range')">Too far → bring in</button>
  <button onclick="decision('recall')">Recall weak → reward more</button>
  <button onclick="decision('over')">Too excited → reset calm</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlayCard" id="overlayText"></div>
</div>

<script>
const startScreen=document.getElementById('startScreen');
const checklistScreen=document.getElementById('checklistScreen');
const walkScreen=document.getElementById('walkScreen');
const phaseTitle=document.getElementById('phaseTitle');
const phaseDesc=document.getElementById('phaseDesc');
const activityList=document.getElementById('activityList');
const timerEl=document.getElementById('timer');
const bar=document.getElementById('bar');
const warning=document.getElementById('warning');
const overlay=document.getElementById('overlay');
const overlayText=document.getElementById('overlayText');

let phases=[];
let current=0;
let startTime;
let interval;
let warned=false;

function showChecklist(){
  startScreen.classList.add('hidden');
  checklistScreen.classList.remove('hidden');
}

function showWalk(){
  checklistScreen.classList.add('hidden');
  walkScreen.classList.remove('hidden');
  startWalk();
}

function startWalk(){
phases=[
{name:"Connection",dur:5,
 desc:"Build calm engagement before freedom. You are establishing attention and responsiveness.",
 activities:["Lead walking","Reward eye contact","Calm sniffing","Short check-ins"]},

{name:"Release Routine",dur:2,
 desc:"Critical transition from control to freedom. You create attention before off-lead movement.",
 activities:["Stop still","Say name once","Wait for eye contact","Reward check-in","Release"]},

{name:"Controlled Freedom",dur:7,
 desc:"Structured off-lead work. She explores but repeatedly reconnects with you.",
 activities:["Let explore","Recall every few mins","Reward return","Release again"]},

{name:"Hunting Work",dur:6,
 desc:"Channel scent drive into structured search games.",
 activities:["Find it games","Scatter treats","Hidden ball search"]},

{name:"Managed Freedom",dur:7,
 desc:"Free movement with regular interruptions to maintain engagement.",
 activities:["Free roam","Call back often","Reward check-ins"]},

{name:"Reset",dur:5,
 desc:"Lower arousal and bring focus back to handler.",
 activities:["Slow walking","Close proximity","Calm sniffing"]},

{name:"Play",dur:8,
 desc:"High arousal play with controlled structure.",
 activities:["Ball throw","Chase","Retrieve with breaks"]},

{name:"Cool Down",dur:5,
 desc:"Finish in calm, settled state.",
 activities:["Slow walk","Relaxed sniffing","Settle"]}
];

current=0;
showPhase();
}

function showPhase(){
let p=phases[current];
phaseTitle.innerText=p.name;
phaseDesc.innerText=p.desc;
activityList.innerHTML="";
p.activities.forEach(a=>{
let li=document.createElement('li');
li.innerText=a;
activityList.appendChild(li);
});
startTimer();
}

function startTimer(){
clearInterval(interval);
startTime=Date.now();
warned=false;
warning.style.display="none";

interval=setInterval(()=>{
let p=phases[current];
let elapsed=(Date.now()-startTime)/60000;
let remaining=p.dur-elapsed;

let pct=(elapsed/p.dur)*100;
bar.style.width=Math.min(100,pct)+"%";

timerEl.innerText=`${Math.max(0,Math.floor(remaining))} min remaining`;

if(remaining<=1 && !warned){
warned=true;
warning.style.display="block";
}

if(remaining<=0){clearInterval(interval);}

},500);
}

function nextPhase(){
if(current<phases.length-1){current++;showPhase();}
}

function showOverlay(msg){
overlayText.innerText=msg;
overlay.style.display="flex";
setTimeout(()=>overlay.style.display="none",2500);
}

function decision(type){
if(type==="range"){
showOverlay("Stop → recall → turn away → reward → release");current=4;showPhase();}
if(type==="recall"){
showOverlay("Move closer → high reward → call once → reward → shorten distance");current=1;showPhase();}
if(type==="over"){
showOverlay("Stop → lead on → sit → wait → calm → continue");current=4;showPhase();}
}
</script>

</body>
</html>
