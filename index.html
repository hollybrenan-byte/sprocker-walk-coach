<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprocker Walk Coach</title>
<meta name="theme-color" content="#1b4332" />

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #e5e7eb;
}

.container {
  padding: 16px;
  max-width: 520px;
  margin: 0 auto;
}

.card {
  background: #111827;
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

h2 {
  margin: 6px 0 10px;
  font-size: 22px;
}

p {
  margin: 6px 0;
  color: #cbd5e1;
}

.small {
  font-size: 12px;
  color: #94a3b8;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  background: #22c55e;
  color: black;
  font-size: 18px;
  font-weight: bold;
}

button:active {
  transform: scale(0.98);
}

.hidden { display: none; }

input {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 6px 0 12px;
  font-size: 16px;
}

label {
  font-size: 14px;
  color: #cbd5e1;
}

.checkbox {
  margin: 6px 0;
}

.progress {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.4s ease;
}

.phaseTitle {
  font-size: 26px;
  font-weight: bold;
}

.phaseText {
  font-size: 16px;
  margin-top: 6px;
}

.warning {
  background: #f59e0b;
  color: black;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display:none;
}
</style>
</head>
<body>

<div class="container">

<div id="startScreen" class="card">
  <h2>🐾 Walk Coach</h2>
  <p>Structured 45-min sprocker walk system</p>
  <button onclick="showChecklist()">Start Walk</button>
</div>

<div id="checklistScreen" class="card hidden">
  <h2>Before You Go</h2>
  <label><input type="checkbox"> Treats (high value)</label><br>
  <label><input type="checkbox"> Scatter treats</label><br>
  <label><input type="checkbox"> Ball / toy</label><br>
  <label><input type="checkbox"> poo bags</label><br>
  <label><input type="checkbox"> Water</label><br>
  <label><input type="checkbox"> Phone charged</label><br>
  <button onclick="showSettings()">Continue</button>
</div>

<div id="settingsScreen" class="card hidden">
  <h2>Walk Setup</h2>

  Connection <input id="t1" type="number" value="5">
  Freedom <input id="t2" type="number" value="7">
  Hunting <input id="t3" type="number" value="6">
  Managed <input id="t4" type="number" value="7">
  Reset <input id="t5" type="number" value="7">
  Play <input id="t6" type="number" value="8">
  Cooldown <input id="t7" type="number" value="5">

  <button onclick="startWalk()">Start Walk</button>
</div>

<div id="walkScreen" class="card hidden">
  <div class="phaseTitle" id="phaseTitle"></div>
  <div class="phaseText" id="phaseText"></div>

  <div class="progress"><div class="bar" id="bar"></div></div>

  <div class="warning" id="warning">⚠️ 1 minute remaining</div>

  <p class="small" id="timer"></p>

  <button id="doneBtn" onclick="nextPhase()">DONE → NEXT</button>
</div>

</div>

<script>
let phases=[];
let current=0;
let startTime;
let interval;
let warned=false;

function vibrate(pattern){
  if(navigator.vibrate) navigator.vibrate(pattern);
}

function showChecklist(){ startScreen.classList.add('hidden'); checklistScreen.classList.remove('hidden'); }
function showSettings(){ checklistScreen.classList.add('hidden'); settingsScreen.classList.remove('hidden'); }

function startWalk(){
phases=[
{name:"Connection",text:"Lead sniff + scatter find it",dur:+t1.value},
{name:"Controlled Freedom",text:"Release + check-ins + chase me",dur:+t2.value},
{name:"Hunting Work",text:"Find it / hidden ball / quartering",dur:+t3.value},
{name:"Managed Freedom",text:"Free but interrupt often",dur:+t4.value},
{name:"Reset",text:"Calm sniff + close work",dur:+t5.value},
{name:"Play Peak",text:"Retrieve / chase / jackpot",dur:+t6.value},
{name:"Cool Down",text:"Slow walk finish",dur:+t7.value}
];

current=0;
settingsScreen.classList.add('hidden');
walkScreen.classList.remove('hidden');
startPhase();
}

function startPhase(){
warned=false;
warning.style.display="none";
bar.style.width="0%";

vibrate([200,100,200]);

let p=phases[current];
phaseTitle.innerText=p.name;
phaseText.innerText=p.text;

startTime=Date.now();
clearInterval(interval);
interval=setInterval(update,500);
}

function update(){
let p=phases[current];
let elapsed=(Date.now()-startTime)/60000;
let remaining=p.dur-elapsed;

if(remaining<=1 && remaining>0 && !warned){
  warned=true;
  warning.style.display="block";
  vibrate([100,80,100,80,300]);
}

if(remaining<=0){
  vibrate([500,200,500]);
  warning.innerText="⏱ Phase complete";
  warning.style.display="block";
  document.getElementById('doneBtn').style.background="#f59e0b";
}

let pct=Math.min(100,(elapsed/p.dur)*100);
bar.style.width=pct+"%";

timer.innerText=Math.max(0,Math.floor(elapsed)) + " / " + p.dur + " min";
}

function nextPhase(){
current++;
if(current>=phases.length){alert("Walk complete!");location.reload();}
else startPhase();
}
</script>

</body>
</html>
