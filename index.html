<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprocker Walk Coach</title>
<meta name="theme-color" content="#1b4332" />

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #0f172a;
  color: #e5e7eb;
}

.container {
  padding: 16px;
  max-width: 540px;
  margin: 0 auto;
}

.card {
  background: #111827;
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.35);
}

h2 {
  margin: 6px 0 10px;
  font-size: 22px;
}

p {
  margin: 6px 0;
  color: #cbd5e1;
}

.small {
  font-size: 12px;
  color: #94a3b8;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border: none;
  border-radius: 14px;
  background: #22c55e;
  color: black;
  font-size: 18px;
  font-weight: bold;
}

button:active { transform: scale(0.98); }

.hidden { display: none; }

.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
}

.check-item input {
  width: 20px;
  height: 20px;
  margin: 0;
}

.check-item label {
  font-size: 15px;
  color: #e5e7eb;
}

input[type="number"] {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin: 6px 0 12px;
  font-size: 16px;
  background: #1f2937;
  color: white;
}

.progress {
  height: 10px;
  background: #1f2937;
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.4s ease;
}

.phaseTitle {
  font-size: 26px;
  font-weight: bold;
}

.phaseText {
  font-size: 15px;
  margin-top: 6px;
  color: #cbd5e1;
}

ul {
  margin: 10px 0 0 18px;
  color: #94a3b8;
}

.warning {
  background: #f59e0b;
  color: black;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display:none;
  font-weight: bold;
}

.decision {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  background: #0b1220;
  border: 1px solid #1f2937;
  border-radius: 14px;
  padding: 10px;
  display: flex;
  gap: 8px;
}

.decision button {
  font-size: 12px;
  padding: 10px;
  background: #334155;
  color: white;
  border-radius: 10px;
  font-weight: normal;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.overlayCard {
  background: #111827;
  padding: 20px;
  border-radius: 14px;
  width: 85%;
}
</style>
</head>
<body>

<div class="container">

<div id="startScreen" class="card">
  <h2>🐾 Walk Coach</h2>
  <p>Structured 45-min sprocker training walk</p>
  <button onclick="initAudio(); showChecklist()">Start Walk</button>
</div>

<div id="checklistScreen" class="card hidden">
  <h2>Before You Go</h2>
  <div class="check-item"><input type="checkbox"><label>Treats (high value rewards)</label></div>
  <div class="check-item"><input type="checkbox"><label>Scatter treats for nose work</label></div>
  <div class="check-item"><input type="checkbox"><label>Ball or toy</label></div>
  <div class="check-item"><input type="checkbox"><label>poo bags</label></div>
  <div class="check-item"><input type="checkbox"><label>Water</label></div>
  <div class="check-item"><input type="checkbox"><label>Phone charged</label></div>
  <button onclick="showSettings()">Continue</button>
</div>

<div id="settingsScreen" class="card hidden">
  <h2>Walk Structure</h2>

  Connection <input id="t1" type="number" value="5">
  Controlled Freedom <input id="t2" type="number" value="7">
  Hunting Work <input id="t3" type="number" value="6">
  Managed Freedom <input id="t4" type="number" value="7">
  Reset <input id="t5" type="number" value="7">
  Play <input id="t6" type="number" value="8">
  Cooldown <input id="t7" type="number" value="5">

  <button onclick="startWalk()">Start Walk</button>
</div>

<div id="walkScreen" class="card hidden">
  <div class="phaseTitle" id="phaseTitle"></div>
  <div class="phaseText" id="phaseText"></div>

  <ul id="activityList"></ul>

  <div class="progress"><div class="bar" id="bar"></div></div>

  <div class="warning" id="warning">⚠️ 1 minute remaining</div>

  <p class="small" id="timer"></p>

  <button onclick="nextPhase()">DONE → NEXT</button>
</div>

</div>

<!-- DECISION MODE -->
<div class="decision">
  <button onclick="decision('range')">Ranging too far</button>
  <button onclick="decision('recall')">Ignoring recall</button>
  <button onclick="decision('over')">Over aroused</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlayCard" id="overlayText"></div>
</div>

<script>
let phases=[];
let current=0;
let startTime;
let interval;
let warned=false;
let audioCtx;

function initAudio(){
  try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
}

function beep(type){
  if(!audioCtx) return;
  let freq = type === "end" ? 880 : 600;
  let dur = type === "end" ? 0.25 : 0.1;

  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function showOverlay(msg){
  overlayText.innerText = msg;
  overlay.style.display="flex";
  setTimeout(()=>overlay.style.display="none",2500);
}

function decision(type){

if(type==="range"){
  showOverlay("Bring her in → Switch to Reset / Close engagement");
  beep("end");
  current = 4;
  startPhase();
}

if(type==="recall"){
  showOverlay("Engagement reset → Controlled Freedom + rewards");
  beep("warning");
  current = 1;
  startPhase();
}

if(type==="over"){
  showOverlay("OVERLOAD → Immediate calm reset");
  beep("end");
  current = 4;
  startPhase();
}
}

function showChecklist(){ startScreen.classList.add('hidden'); checklistScreen.classList.remove('hidden'); }
function showSettings(){ checklistScreen.classList.add('hidden'); settingsScreen.classList.remove('hidden'); }

function startWalk(){
phases=[
{name:"Connection",dur:+t1.value, activities:["Lead sniffing","Engagement checks","Scatter find it"]},
{name:"Controlled Freedom",dur:+t2.value, activities:["Off lead movement","Recall reinforcement","Handler check-ins"]},
{name:"Hunting Work",dur:+t3.value, activities:["Hidden scent search","Quartering","Ball tracking"]},
{name:"Managed Freedom",dur:+t4.value, activities:["Free roaming","Interrupt + reconnect","Focus resets"]},
{name:"Reset",dur:+t5.value, activities:["Calm sniffing","Close engagement","Decompression"]},
{name:"Play Peak",dur:+t6.value, activities:["Ball chase","Retrieve","High reward play"]},
{name:"Cool Down",dur:+t7.value, activities:["Slow walking","Arousal downshift","Settle"]}
];

current=0;
settingsScreen.classList.add('hidden');
walkScreen.classList.remove('hidden');
startPhase();
}

function renderActivities(p){
let list=document.getElementById("activityList");
list.innerHTML="";

p.activities.forEach(a=>{
  let li=document.createElement("li");
  li.innerText=a;
  list.appendChild(li);
});
}

function startPhase(){
warned=false;
warning.style.display="none";
bar.style.width="0%";

beep("start");

let p=phases[current];
phaseTitle.innerText=p.name;
phaseText.innerText="";
renderActivities(p);

startTime=Date.now();
clearInterval(interval);
interval=setInterval(update,500);
}

function update(){
let p=phases[current];
let elapsed=(Date.now()-startTime)/60000;
let remaining=p.dur-elapsed;

if(remaining<=1 && remaining>0 && !warned){
  warned=true;
  warning.style.display="block";
  beep("warning");
}

if(remaining<=0){
  beep("end");
  warning.style.display="block";
}

bar.style.width=Math.min(100,(elapsed/p.dur)*100)+"%";

timer.innerText=Math.max(0,Math.floor(elapsed)) + " / " + p.dur + " min";
}

function nextPhase(){
current++;
if(current>=phases.length){beep("end");alert("Walk complete!");location.reload();}
else startPhase();
}
</script>

</body>
</html>
