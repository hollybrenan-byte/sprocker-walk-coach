<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sprocker Walk Coach</title>
<meta name="theme-color" content="#1b4332" />

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:#0f172a;
  color:#e5e7eb;
}

.container{padding:16px;max-width:540px;margin:0 auto;}

.card{
  background:#111827;
  padding:18px;
  border-radius:16px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
}

h2{margin:6px 0 10px;font-size:22px;}
p{color:#cbd5e1;}

.hidden{display:none;}

button{
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:#22c55e;
  color:black;
  font-size:18px;
  font-weight:bold;
}

button:active{transform:scale(0.98);}

.check-item{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

.check-item input{width:20px;height:20px;}

.small{font-size:12px;color:#94a3b8;}

ul{color:#94a3b8;}

.decision{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  display:flex;
  gap:8px;
}

.decision button{
  font-size:12px;
  padding:10px;
  background:#334155;
  color:white;
  border-radius:10px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.overlayCard{
  background:#111827;
  padding:20px;
  border-radius:14px;
  width:85%;
}
</style>
</head>
<body>

<div class="container">

<div id="startScreen" class="card">
  <h2>🐾 Walk Coach</h2>
  <button onclick="showChecklist()">Start Walk</button>
</div>

<div id="checklistScreen" class="card hidden">
  <h2>Before You Go</h2>
  <div class="check-item"><input type="checkbox"><label>Treats</label></div>
  <div class="check-item"><input type="checkbox"><label>Scatter treats</label></div>
  <div class="check-item"><input type="checkbox"><label>Ball</label></div>
  <div class="check-item"><input type="checkbox"><label>Poo bags</label></div>
  <button onclick="showWalk()">Continue</button>
</div>

<div id="walkScreen" class="card hidden">
  <h2 id="phaseTitle"></h2>
  <ul id="activityList"></ul>
  <button onclick="nextPhase()">NEXT</button>
</div>

</div>

<div class="decision">
  <button onclick="decision('range')">Too far → bring in</button>
  <button onclick="decision('recall')">Recall weak → reward more</button>
  <button onclick="decision('over')">Too excited → reset calm</button>
</div>

<div class="overlay" id="overlay">
  <div class="overlayCard" id="overlayText"></div>
</div>

<script>
let phases=[];
let current=0;

function showChecklist(){
  startScreen.classList.add('hidden');
  checklistScreen.classList.remove('hidden');
}

function showWalk(){
  checklistScreen.classList.add('hidden');
  walkScreen.classList.remove('hidden');
  startWalk();
}

function startWalk(){
phases=[
{name:"Release Routine",activities:["Pause → name → reward check-in → release"]},
{name:"Connection",activities:["Lead walking","Check-ins","Reward orientation"]},
{name:"Controlled Freedom",activities:["Explore","Recall","Reward returns"]},
{name:"Hunting Work",activities:["Search games","Find it"]},
{name:"Managed Freedom",activities:["Free roam","Recall checks"]},
{name:"Reset",activities:["Calm sniff","Close work"]},
{name:"Play",activities:["Ball","Chase"]},
{name:"Cool Down",activities:["Slow walk","Settle"]}
];
current=0;
showPhase();
}

function showPhase(){
let p=phases[current];
phaseTitle.innerText=p.name;
activityList.innerHTML="";
p.activities.forEach(a=>{
let li=document.createElement("li");li.innerText=a;activityList.appendChild(li);
});
}

function nextPhase(){
if(current<phases.length-1){current++;showPhase();}
}

function showOverlay(msg){
overlayText.innerText=msg;
overlay.style.display="flex";
setTimeout(()=>overlay.style.display="none",2500);
}

function decision(type){
if(type==="range"){
showOverlay("Stop → recall → turn away → reward → release");
current=4;
showPhase();
}
if(type==="recall"){
showOverlay("Move closer → high reward → call once → reward → shorten distance");
current=1;
showPhase();
}
if(type==="over"){
showOverlay("Stop → lead on → sit → wait → calm → continue");
current=4;
showPhase();
}
}
</script>

</body>
</html>
